<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinWise UI - Interactive</title>
<style>
  /* Reset and Base Styles */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  /* Mobile Container */
  .mobile-container {
    width: 375px; height: 812px; background-color: #ffffff; border: 2px solid #333;
    border-radius: 4px; display: flex; flex-direction: column; overflow: hidden;
    position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  /* Header & Toolbar */
  .app-header { padding: 24px 20px 16px; background-color: #ffffff; }
  .logo { color: #064528; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .toolbar { background-color: #e5f2e5; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  .toolbar svg { width: 20px; height: 20px; stroke: #000; stroke-width: 1.5; fill: none; cursor: pointer; }
  .divider { width: 2px; height: 20px; background-color: #000; }

  /* Main Content Area */
  .content { flex: 1; padding: 20px; background-color: #ffffff; overflow-y: auto; display: flex; flex-direction: column; }
  
  /* Utility Classes for State Management */
  .hidden { display: none !important; }
  .view-container { display: flex; flex-direction: column; gap: 16px; flex: 1; }

  /* Card Layouts */
  .card { background-color: #e5f2e5; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .card-title { font-size: 18px; font-weight: 700; color: #000; }
  .status-dot { width: 16px; height: 16px; background-color: #064528; border-radius: 50%; }
  .card-description { font-size: 14px; color: #000; margin-top: -4px; line-height: 1.4; }
  .card-btn { align-self: flex-start; background-color: #333333; color: #ffffff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 4px; }

  /* Image Placeholders and Previews */
  .image-box { width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; object-fit: cover; }
  .image-placeholder {
    background-color: white;
    background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0), linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0);
    background-size: 30px 30px; background-position: 0 0, 15px 15px;
  }

  /* Specific Interactive Elements */
  .cta-button { background-color: #064528; color: white; border: none; border-radius: 8px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; width: 100%; }
  .cta-button:active { opacity: 0.9; }
  
  .cancel-button { background-color: transparent; color: #333; border: 2px solid #ccc; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; width: 100%; }

  /* Loading State */
  .loading-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; }
  .spinner { border: 4px solid #e5f2e5; border-top: 4px solid #064528; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .loading-text { font-size: 16px; color: #333; font-weight: 500; }

  /* Bottom Navigation */
  .bottom-nav { background-color: #74bc76; height: 80px; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
  .bottom-nav svg { width: 28px; height: 28px; stroke: #000; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: transform 0.1s; }
  .bottom-nav svg:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="mobile-container">
  
  <header class="app-header">
    <h1 class="logo">BinWise</h1>
  </header>

  <div class="toolbar">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    <span class="divider"></span>
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
  </div>

  <main class="content">
    
    <div id="view-home" class="view-container">
      <div class="card">
        <div class="image-box image-placeholder"></div>
        <div class="card-header">
          <h2 class="card-title">Category</h2>
          <span class="status-dot"></span>
        </div>
        <p class="card-description">Description</p>
        <button class="card-btn">Button</button>
      </div>
    </div>

    <div id="view-preview" class="view-container hidden">
      <img id="preview-image" class="image-box" src="" alt="Preview" />
      <button id="btn-classify" class="cta-button">Classify Image</button>
      <button id="btn-cancel" class="cancel-button">Cancel & Retake</button>
    </div>

    <div id="view-loading" class="view-container hidden">
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing image...</p>
      </div>
    </div>

    <div id="view-result" class="view-container hidden">
      <div class="card">
        <img id="result-image" class="image-box" src="" alt="Result" />
        <div class="card-header">
          <h2 class="card-title">Recyclable Plastic</h2>
          <span class="status-dot"></span>
        </div>
        <p id="result-description" class="card-description"></p>
        <button id="btn-log-item" class="card-btn">Log Item</button>
      </div>
    </div>

  </main>

  <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" />
  <input type="file" id="upload-input" accept="image/*" class="hidden" />

  <nav class="bottom-nav">
    <svg id="btn-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    <svg id="btn-camera" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    <svg id="btn-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
  </nav>

</div>

<script>
  // DOM Elements
  const cameraInput = document.getElementById('camera-input');
  const uploadInput = document.getElementById('upload-input');
  const btnCamera = document.getElementById('btn-camera');
  const btnUpload = document.getElementById('btn-upload');
  const btnHome = document.getElementById('btn-home');
  const btnClassify = document.getElementById('btn-classify');
  const btnCancel = document.getElementById('btn-cancel');
  const btnLogItem = document.getElementById('btn-log-item');

  const views = {
    home: document.getElementById('view-home'),
    preview: document.getElementById('view-preview'),
    loading: document.getElementById('view-loading'),
    result: document.getElementById('view-result')
  };

  const previewImage = document.getElementById('preview-image');
  const resultImage = document.getElementById('result-image');

  function switchView(targetView) {
    Object.values(views).forEach(view => view.classList.add('hidden'));
    views[targetView].classList.remove('hidden');
  }

  // Handle image file reading logic for both inputs
  function processSelectedFile(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        resultImage.src = e.target.result;
        switchView('preview');
      };
      reader.readAsDataURL(file);
    }
    // Clear inputs so the same file can be selected again if needed
    event.target.value = ''; 
  }

  // Trigger correct inputs
  btnCamera.addEventListener('click', () => cameraInput.click());
  btnUpload.addEventListener('click', () => uploadInput.click());

  // Listen for file selections
  cameraInput.addEventListener('change', processSelectedFile);
  uploadInput.addEventListener('change', processSelectedFile);

  // Cancel & Retake button
  btnCancel.addEventListener('click', () => {
    switchView('home');
  });

  // Classify Image
  btnClassify.addEventListener('click', () => {
    switchView('loading');
    
    // Simulating API call delay. 
    // This is where you will eventually put your fetch() call to Django.
    setTimeout(() => {
      switchView('result');
    }, 2500);
  });

  // Log Item working functionality
  btnLogItem.addEventListener('click', () => {
    // Simulate sending log data to backend
    alert('Item successfully logged to backend database!');
    switchView('home');
  });

  // Bottom Nav Home Button
  btnHome.addEventListener('click', () => {
    switchView('home');
  });
</script>

</body>
</html>
