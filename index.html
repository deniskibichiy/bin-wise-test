<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>


    <div class="mobile-container">
        <header id="header">
            <h1>BinWise</h1>
        </header>


        <main>

            <dialog id="congrats-dialog" class="modal-content">
                <button id="closeModal" class="star-close">&#9733;</button>

                <div class="modal-body">
                    <h2>Congrats!</h2>
                    <img src="./images/splash.jpeg" alt="">
                    <p>A Recyclable at a time saves lives!</p>
                </div>
            </dialog>


            <div id="input-view" class="view hidden">
                <div class="icon">
                    <img id="hero" src="./images/download.png" alt="">
                </div>
                <div class="hero-text">
                    <p><strong>Upload</strong> or <strong>capture an image</strong> to begin. Binnie will do the rest.</p>
                </div>
            </div>


            <div id="preview-view" class="preview-card preview-view view hidden">
                <div class="preview-text">
                    <h3 id="preview-heading">Confirm Photo</h3>
                    <p>Is the item clear and centered?</p>
                </div>
                <div class="image-frame">
                    <img id="imagePreview" src="./images/trash.jpg" alt="Captured item">
                </div>
                <div class="preview-actions">
                    <button id="classifyBtn" class="btn-primary">
                        <span>Classify Item</span>
                    </button>
                    <button id="retakeBtn" class="btn-ghost">Retake Photo</button>
                </div>
            </div>

            <div id="results-view" class=" view">
                <h2>Classification Results</h2>
                <div class="result-card">
                    <p><strong>Bin:</strong> <span id="bin">Blue</span></p>
                    <p><strong>Category:</strong> <span id="category">Recyclable</span></p>
                    <p><strong>Explanation:</strong> <span id="explanation">They are Recyclable because of this and this and this</span></p>
                </div>
                <div class="actions-footer">
                    <button id="finishBtn" class="btn-primary-large"> Finish</button>
                </div>
            </div>


            </main>


            <footer class="footer">
                <button class="footer-btn">
                     <svg id="btn-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
                <button class="footer-btn">
                        <svg id="btn-camera" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </button>
                <button class="footer-btn" id="uploadButton">
                        <svg id="btn-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
            </footer>

        <!-- app.js must load before frontend_ui.js -->
        <script src="./index.js"></script>
    </div>
</body>
</html>
